<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Angus 吉祥物 - 云海穿梭互动版</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: block;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
            font-family: 'Arial Rounded MT Bold', sans-serif;
        }

        /* --- 新增：开场厚云层穿梭特效 --- */
        .cloud-gate-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(241,242,246,0.9) 50%, rgba(223,228,234,0) 100%);
            backdrop-filter: blur(20px);
            z-index: 100;
            pointer-events: none; /* 防止阻挡用户点击 */
            animation: cloudDisperse 1.8s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards;
        }

        @keyframes cloudDisperse {
            0% { opacity: 1; transform: scale(1); backdrop-filter: blur(20px); }
            50% { opacity: 0.8; backdrop-filter: blur(10px); }
            100% { opacity: 0; transform: scale(1.5); backdrop-filter: blur(0px); display: none; }
        }

        /* --- 背景慢速漂浮 Emoji --- */
        .emoji-bg {
            position: absolute;
            font-size: 24px;
            user-select: none;
            z-index: 0;
        }
        @keyframes slowFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* 整个舞台：配合开场穿梭产生由远及近的走来动效 */
        .mascot-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 600px;
            display: block;
            z-index: 2;
            animation: stageEntrance 2s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
        }

        @keyframes stageEntrance {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; filter: blur(5px); }
            40% { opacity: 0.3; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; filter: blur(0); }
        }

        /* 彩虹文字 */
        .rainbow-text {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 42px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 24px; 
            white-space: nowrap;
            background: linear-gradient(to right, #ff7675, #fdcb6e, #55efc4, #74b9ff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 1;
            text-align: center;
            padding-left: 24px; 
        }

        /* 3D云朵主体容器 */
        .cloud-container {
            position: absolute;
            top: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            height: 170px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }

        /* 常规呼吸漂浮 */
        .cloud-body {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #f1f2f6 75%, #dfe4ea 100%);
            border-radius: 120px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), inset -5px -5px 15px rgba(0,0,0,0.04);
            animation: floatCloud 4s ease-in-out infinite alternate;
        }

        .cloud-body::before, .cloud-body::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }
        .cloud-body::before { width: 140px; height: 140px; top: -60px; left: 35px; }
        .cloud-body::after { width: 160px; height: 160px; top: -75px; right: 25px; }

        .cloud-container.zoom-in {
            transform: translateX(-50%) scale(1.25) translateY(30px);
        }
        .cloud-container.jump-active {
            animation: jumpAnimate 0.5s ease-out;
        }

        /* 2D 简笔画面部五官 */
        .face-doodle {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 60px;
            z-index: 10;
        }
        .eye {
            width: 12px;
            height: 12px;
            background: #1e272e;
            border-radius: 50%;
            position: absolute;
            top: 12px;
        }
        .eye.left { left: 20px; }
        .eye.right { right: 20px; }
        .smile {
            width: 36px;
            height: 18px;
            border: 4px solid #1e272e;
            border-top: transparent;
            border-left: transparent;
            border-right: transparent;
            border-radius: 0 0 36px 36px;
            position: absolute;
            bottom: 5px;
            left: 42px;
        }

        /* 2D 简笔画短腿 */
        .legs-doodle {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 50px;
            z-index: 1;
        }
        .leg {
            width: 8px;
            height: 40px;
            background: #1e272e;
            border-radius: 4px;
            position: absolute;
        }
        .leg.left { left: 10px; transform-origin: top center; animation: swingLegLeft 4s ease-in-out infinite alternate; }
        .leg.right { right: 10px; transform-origin: top center; animation: swingLegRight 4s ease-in-out infinite alternate; }

        /* --- 核心优化：慢速丝滑互换道具系统 --- */
        .item-slot-left {
            position: absolute;
            left: -40px;
            top: 70px;
            width: 50px;
            height: 35px;
            z-index: 5;
        }
        .item-slot-right {
            position: absolute;
            right: -110px;
            top: -20px;
            width: 160px;
            height: 180px;
            z-index: 5;
            perspective: 1000px; 
        }

        .arm-left-doodle {
            width: 50px;
            height: 35px;
            border: 6px solid #1e272e;
            border-top: transparent;
            border-right: transparent;
            border-radius: 0 0 0 30px;
            transform: rotate(20deg);
        }
        .arm-right-doodle {
            position: absolute;
            left: 40px;
            bottom: 30px;
            width: 40px;
            height: 70px;
            border: 6px solid #1e272e;
            border-bottom: transparent;
            border-left: transparent;
            border-radius: 0 30px 0 0;
            transform: rotate(-15deg);
        }

        /* UBC 字母：添加慢速平滑交换动画过渡 */
        .ubc-container {
            position: absolute;
            left: -40px;
            top: -25px;
            display: flex;
            gap: 4px;
            /* 核心修改：设定 0.8s 慢速互换曲线 */
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
        }
        .ubc-letter {
            font-family: 'Arial Black', sans-serif;
            font-size: 26px;
            font-weight: 900;
            color: #002145; 
            text-shadow: 1px 1px 0px #001125, 2px 2px 0px #001125, 3px 3px 0px #001125;
            animation: playLetters 1.5s ease-in-out infinite alternate;
        }
        .ubc-letter:nth-child(1) { animation-delay: 0s; }
        .ubc-letter:nth-child(2) { animation-delay: 0.3s; }
        .ubc-letter:nth-child(3) { animation-delay: 0.6s; }

        /* 精致大电脑：同样添加 0.8s 慢速平滑互换过渡 */
        .fancy-laptop {
            position: absolute;
            top: 0;
            left: 10px;
            width: 110px;
            height: 85px;
            background: rgba(116, 185, 255, 0.45); 
            border: 4px solid #1e272e;
            border-radius: 12px;
            backdrop-filter: blur(6px);
            box-shadow: 2px 2px 0px #1e272e, 4px 4px 0px rgba(116, 185, 255, 0.6);
            transform-style: preserve-3d;
            transform-origin: center center;
            animation: spinLaptop 7s linear infinite;
            /* 核心修改：设定 0.8s 慢速互换曲线 */
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
        }
        .fancy-laptop::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 86px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid #1e272e;
            border-radius: 6px;
        }
        .keyboard-grid {
            position: absolute;
            bottom: 8px;
            left: 8px;
            width: 86px;
            height: 20px;
            border-top: 3px solid #1e272e;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2px;
            padding-top: 2px;
        }
        .key-dot { background-color: #1e272e; border-radius: 1px; opacity: 0.8; }

        /* 当互换位置状态激活时，改变绝对坐标实现慢速滑行动效 */
        .swapped .ubc-container {
            /* 从左侧平滑滑向右侧指尖 */
            left: 185px;
            top: -90px;
        }
        .swapped .fancy-laptop {
            /* 从右侧平滑滑向左侧手掌 */
            left: -210px;
            top: 40px;
        }

        /* 提示词引导语 */
        .click-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: #a29bfe;
            letter-spacing: 2px;
            font-weight: bold;
            opacity: 0.8;
            animation: pulseHint 1.5s ease-in-out infinite alternate;
            user-select: none;
        }

        /* --- 动画效果库 --- */
        @keyframes floatCloud { 0% { transform: translateY(0px); } 100% { transform: translateY(-20px); } }
        @keyframes swingLegLeft { 0% { transform: rotate(-6deg); } 100% { transform: rotate(4deg); } }
        @keyframes swingLegRight { 0% { transform: rotate(-4deg); } 100% { transform: rotate(6deg); } }
        @keyframes playLetters { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-20px) rotate(10deg); } }
        @keyframes spinLaptop { 0% { transform: rotateY(0deg) rotateX(10deg); } 100% { transform: rotateY(360deg) rotateX(10deg); } }
        @keyframes pulseHint { 0% { opacity: 0.4; transform: translateX(-50%) scale(0.95); } 100% { opacity: 0.9; transform: translateX(-50%) scale(1.05); } }
        @keyframes jumpAnimate {
            0% { transform: translateX(-50%) scale(1) translateY(0); }
            30% { transform: translateX(-50%) scale(1.1, 0.85) translateY(0); }
            50% { transform: translateX(-50%) scale(0.95, 1.1) translateY(-60px); }
            70% { transform: translateX(-50%) scale(1.05, 0.95) translateY(0); }
            100% { transform: translateX(-50%) scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="cloud-gate-overlay"></div>

<div id="emojiBackground"></div>

<div class="mascot-stage" id="mascotStage">
    <div class="rainbow-text">henry angus</div>
    
    <div class="cloud-container" id="interactiveCloud">
        <div class="cloud-body">
            
            <div class="item-slot-left">
                <div class="arm-left-doodle"></div>
            </div>

            <div class="item-slot-right">
                <div class="arm-right-doodle"></div>
            </div>

            <div class="ubc-container" id="propUBC">
                <span class="ubc-letter">U</span>
                <span class="ubc-letter">B</span>
                <span class="ubc-letter">C</span>
            </div>

            <div class="fancy-laptop" id="propLaptop">
                <div class="keyboard-grid">
                    <div class="key-dot"></div><div class="key-dot"></div><div class="key-dot"></div><div class="key-dot"></div><div class="key-dot"></div>
                    <div class="key-dot"></div><div class="key-dot"></div><div class="key-dot"></div><div class="key-dot"></div><div class="key-dot"></div>
                </div>
            </div>

            <div class="face-doodle">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="smile"></div>
            </div>

            <div class="legs-doodle">
                <div class="leg left"></div>
                <div class="leg right"></div>
            </div>
            
        </div>
    </div>
</div>

<div class="click-hint">click this cloud~</div>

<script>
    // 1. 动态生成漂浮的天空 Emoji 背景
    const emojis = ['✨', '🌈', '🌼', '⚡', '🎈', '☁️', '🌸', '⭐'];
    const bgContainer = document.getElementById('emojiBackground');
    for (let i = 0; i < 20; i++) {
        const div = document.createElement('div');
        div.className = 'emoji-bg';
        div.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        div.style.left = Math.random() * 100 + 'vw';
        div.style.top = Math.random() * 100 + 'vh';
        
        const duration = 6 + Math.random() * 6;
        const delay = -Math.random() * 6;
        div.style.animation = `slowFloat ${duration}s ease-in-out ${delay}s infinite`;
        div.style.opacity = 0.15 + Math.random() * 0.25;
        bgContainer.appendChild(div);
    }

    // 2. 区分单击与双击的交互逻辑
    const cloud = document.getElementById('interactiveCloud');
    const stage = document.getElementById('mascotStage');

    let clickTimeout = null;
    let isZoomed = false;
    let isSwapped = false;

    cloud.addEventListener('click', (e) => {
        if (e.detail === 1) {
            clickTimeout = setTimeout(() => {
                // 单击：走近 / 远离屏幕
                isZoomed = !isZoomed;
                if (isZoomed) {
                    cloud.classList.add('zoom-in');
                } else {
                    cloud.classList.remove('zoom-in');
                }
            }, 250); 
        }
    });

    cloud.addEventListener('dblclick', () => {
        clearTimeout(clickTimeout); // 取消单击判定

        // 双击响应 1：向上跳跃一下
        cloud.classList.remove('jump-active');
        void cloud.offsetWidth; // 触发重绘
        cloud.classList.add('jump-active');
        setTimeout(() => cloud.classList.remove('jump-active'), 500);

        // 双击响应 2：慢速划线互换左右道具位置
        isSwapped = !isSwapped;
        if (isSwapped) {
            stage.classList.add('swapped');
        } else {
            stage.classList.remove('swapped');
        }
    });
</script>

</body>
</html>
